<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <link rel="icon" type="image/x-icon" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQkfEQwlbpfThPXJNxH9OTOGQ4ozDnj1B3avg&s">
  <title>SpendWise — Login / Sign Up</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background:
        radial-gradient(55% 45% at 10% 10%, rgba(120,210,190,0.35), transparent 60%),
        radial-gradient(50% 45% at 92% 8%, rgba(120,170,255,0.28), transparent 60%),
        radial-gradient(55% 45% at 85% 90%, rgba(255,190,210,0.22), transparent 60%),
        radial-gradient(55% 45% at 6% 88%, rgba(150,220,255,0.28), transparent 60%),
        linear-gradient(160deg, #eef4f9 0%, #e7eff6 100%);
      background-attachment: fixed;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 1.5rem;
    }

    .auth-container {
      background: rgba(255,255,255,0.62);
      backdrop-filter: blur(28px) saturate(180%);
      -webkit-backdrop-filter: blur(28px) saturate(180%);
      border: 1px solid rgba(255,255,255,0.7);
      border-radius: 32px;
      padding: 2.2rem;
      max-width: 440px;
      width: 100%;
      box-shadow: 0 24px 50px -12px rgba(20,50,70,0.22);
    }

    .logo { text-align: center; margin-bottom: 1.5rem; }
    .logo i {
      font-size: 2.2rem; color: #2A8074;
      background: linear-gradient(150deg, #ffffff, #eef6f4);
      padding: 14px; width: 68px; height: 68px;
      display: inline-flex; align-items: center; justify-content: center;
      border-radius: 24px;
      box-shadow: 0 10px 22px rgba(42,128,116,0.22), inset 0 1px 1px rgba(255,255,255,0.9);
    }
    .logo h1 {
      font-size: 1.6rem; margin-top: 0.7rem; font-weight: 700; letter-spacing: -0.02em;
      background: linear-gradient(135deg, #1f6a8c, #2A8074);
      background-clip: text; -webkit-background-clip: text; color: transparent;
    }
    .logo p { color: #6f8faa; font-size: 0.8rem; }

    .toggle-buttons {
      display: flex; gap: 0.4rem; margin-bottom: 1.5rem;
      background: rgba(255,255,255,0.5);
      border-radius: 16px; padding: 4px;
      border: 1px solid rgba(255,255,255,0.6);
    }
    .toggle-btn {
      flex: 1; background: none; border: none; padding: 0.7rem;
      font-size: 0.95rem; font-weight: 600; cursor: pointer;
      color: #8ba0b5; transition: 0.2s; border-radius: 12px;
    }
    .toggle-btn.active {
      color: white;
      background: linear-gradient(135deg, #33917f, #1c5f54);
      box-shadow: 0 6px 14px rgba(28,95,84,0.3);
    }

    .form-stack {
      display: grid;
      isolation: isolate;
    }
    .form {
      grid-area: 1 / 1;
      opacity: 0;
      transform: scale(0.94) translateY(10px);
      filter: blur(14px) saturate(160%);
      pointer-events: none;
      transition: opacity 0.55s cubic-bezier(.22,.85,.32,1),
                  transform 0.55s cubic-bezier(.22,.85,.32,1),
                  filter 0.55s cubic-bezier(.22,.85,.32,1);
      will-change: opacity, transform, filter;
    }
    .form.active {
      opacity: 1;
      transform: scale(1) translateY(0);
      filter: blur(0) saturate(100%);
      pointer-events: auto;
    }

    .input-group { margin-bottom: 1rem; }
    .input-group label { font-size: 0.75rem; font-weight: 600; color: #2c3e44; display: block; margin-bottom: 5px; }
    .input-group label i { margin-right: 6px; color: #2A8074; }
    .input-group input {
      width: 100%; padding: 12px 14px; border-radius: 16px;
      border: 1.5px solid rgba(20,50,70,0.12);
      background: rgba(255,255,255,0.7);
      font-family: 'Inter', sans-serif; font-size: 0.9rem; transition: 0.2s;
    }
    .input-group input:focus {
      outline: none; border-color: #2A8074; background: white;
      box-shadow: 0 0 0 4px rgba(42,128,116,0.15);
    }

    .btn-primary {
      position: relative; overflow: hidden;
      background: linear-gradient(135deg, rgba(51,145,127,0.68), rgba(28,95,84,0.72));
      backdrop-filter: blur(18px) saturate(220%);
      -webkit-backdrop-filter: blur(18px) saturate(220%);
      border: 1px solid rgba(255,255,255,0.45); color: white; padding: 13px; border-radius: 18px;
      font-weight: 600; font-size: 1rem; width: 100%; cursor: pointer; margin-top: 0.8rem;
      transition: 0.25s cubic-bezier(.2,.8,.2,1);
      box-shadow: 0 10px 24px rgba(28,95,84,0.3), inset 0 1px 1px rgba(255,255,255,0.55), inset 0 0 18px rgba(255,255,255,0.12);
    }
    .btn-primary::before {
      content: ''; position: absolute; top: -60%; left: -20%; width: 55%; height: 220%;
      background: linear-gradient(120deg, rgba(255,255,255,0.55), rgba(255,255,255,0) 65%);
      transform: rotate(20deg); pointer-events: none;
    }
    .btn-primary > * { position: relative; z-index: 1; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 16px 30px rgba(28,95,84,0.36), inset 0 1px 1px rgba(255,255,255,0.65); }

    .divider { display: flex; align-items: center; text-align: center; margin: 1.2rem 0; color: #b9c3d0; font-size: 0.75rem; }
    .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid rgba(20,50,70,0.1); }
    .divider span { margin: 0 10px; }

    .social-buttons { display: flex; gap: 1rem; }
    .social-btn {
      flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 11px; border-radius: 16px;
      border: 1.5px solid rgba(20,50,70,0.1);
      background: rgba(255,255,255,0.6);
      cursor: pointer; font-weight: 500; font-size: 0.85rem; transition: 0.2s;
    }
    .social-btn:hover { background: white; border-color: rgba(20,50,70,0.2); transform: translateY(-1px); }
    .social-btn.google i { color: #DB4437; }

    .error-msg {
      background: rgba(255,233,233,0.85); color: #D35C5C; padding: 9px 12px;
      border-radius: 14px; font-size: 0.75rem; margin-bottom: 1rem; display: none;
    }
    .success-msg {
      background: rgba(224,247,232,0.85); color: #2C8A5E; padding: 9px 12px;
      border-radius: 14px; font-size: 0.75rem; margin-bottom: 1rem; display: none;
    }

    .loading-spinner { display: none; text-align: center; margin-top: 1rem; }
    .loading-spinner i { font-size: 1.2rem; color: #2A8074; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    footer { text-align: center; margin-top: 1.5rem; font-size: 0.7rem; color: #8ba0b5; }
    .password-hint { font-size: 0.7rem; color: #7E8C9E; margin-top: 4px; }

  </style>
</head>
<body>
<div class="auth-container">
  <div class="logo">
    <i class="fas fa-coins"></i>
    <h1>SpendWise</h1>
    <p>Daily Expense Tracker</p>
  </div>

  <div class="toggle-buttons">
    <button class="toggle-btn active" data-form="login">Sign In</button>
    <button class="toggle-btn" data-form="signup">Sign Up</button>
  </div>

  <div id="errorMsg" class="error-msg"></div>
  <div id="successMsg" class="success-msg"></div>
  <div id="loadingSpinner" class="loading-spinner">
    <i class="fas fa-spinner"></i> Loading...
  </div>

  <div class="form-stack">
    <!-- Login Form -->
    <form id="loginForm" class="form active">
      <div class="input-group">
        <label><i class="fas fa-envelope"></i> Email</label>
        <input type="email" id="loginEmail" placeholder="you@example.com" required>
      </div>
      <div class="input-group">
        <label><i class="fas fa-lock"></i> Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-primary">Sign In</button>
      <div style="text-align:right;margin-top:8px;">
        <button type="button" id="forgotPasswordBtn" style="background:none;border:none;color:#2A7F6E;font-size:0.78rem;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;padding:0;">
          Forgot password?
        </button>
      </div>
    </form>

    <!-- Forgot password function, only showed up when clicked -->
    <div id="forgotPanel" style="display:none;margin-top:0.6rem;">
      <div class="input-group">
        <label><i class="fas fa-envelope"></i> Enter your email to reset password</label>
        <input type="email" id="resetEmail" placeholder="you@example.com">
      </div>
      <button type="button" id="sendResetBtn" class="btn-primary" style="margin-top:0;">
        <i class="fas fa-paper-plane"></i> Send Reset Link
      </button>
      <div style="text-align:center;margin-top:8px;">
        <button type="button" id="cancelResetBtn" style="background:none;border:none;color:#7a94ae;font-size:0.78rem;cursor:pointer;font-family:'Inter',sans-serif;">
          Cancel
        </button>
      </div>
    </div>

    <!-- Signup Form -->
    <form id="signupForm" class="form">
      <div class="input-group">
        <label><i class="fas fa-user"></i> Full Name</label>
        <input type="text" id="signupName" placeholder="Ahmad Ali" required>
      </div>
      <div class="input-group">
        <label><i class="fas fa-envelope"></i> Email</label>
        <input type="email" id="signupEmail" placeholder="you@example.com" required>
      </div>
      <div class="input-group">
        <label><i class="fas fa-lock"></i> Password</label>
        <input type="password" id="signupPassword" placeholder="••••••••" required>
        <div class="password-hint">Password must be at least 6 characters</div>
      </div>
      <button type="submit" class="btn-primary">Create Account</button>
    </form>
  </div>

  <div class="divider">
    <span>or continue with</span>
  </div>

  <!-- login with google button (can add more opt if wanted to) -->
  <div class="social-buttons">
    <button class="social-btn google" id="googleSignInBtn">
      <i class="fab fa-google"></i> Sign in with Google
    </button>
  </div>

  <footer>
    <div style="margin-top: 6px; font-size: 0.7rem;">
      <a href="admin_login.html" style="color: #2A7F6E; text-decoration: none;">Admin?</a>
    </div>
    <i class="far fa-credit-card"></i> Secure · Free · Smart
  </footer>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { 
    getAuth, 
    signInWithPopup, 
    GoogleAuthProvider, 
    createUserWithEmailAndPassword, 
    signInWithEmailAndPassword,
    sendPasswordResetEmail,
    updateProfile
  } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import { 
    getFirestore, 
    doc, 
    getDoc,
    setDoc, 
    serverTimestamp 
  } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
  
  const firebaseConfig = {
    apiKey: "AIzaSyC0BnVATHYNbRSUKorbfGN6-6-h6fNv2gY",
    authDomain: "spendwise-6767.firebaseapp.com",
    projectId: "spendwise-6767",
    storageBucket: "spendwise-6767.firebasestorage.app",
    messagingSenderId: "786309362149",
    appId: "1:786309362149:web:1a419faed45135411e7f0c"
  };
  
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const googleProvider = new GoogleAuthProvider();
  
  const errorDiv = document.getElementById('errorMsg');
  const successDiv = document.getElementById('successMsg');
  const loadingSpinner = document.getElementById('loadingSpinner');
  const googleBtn = document.getElementById('googleSignInBtn');
  
  function showError(msg) {
    errorDiv.textContent = msg;
    errorDiv.style.display = 'block';
    successDiv.style.display = 'none';
    setTimeout(() => {
      errorDiv.style.display = 'none';
    }, 4000);
  }
  
  function showSuccess(msg) {
    successDiv.textContent = msg;
    successDiv.style.display = 'block';
    errorDiv.style.display = 'none';
    setTimeout(() => {
      successDiv.style.display = 'none';
    }, 3000);
  }
  
  function showLoading(show) {
    loadingSpinner.style.display = show ? 'block' : 'none';
  }
  
  // save to firestore function
  async function saveUserToFirestore(user, provider, name = null) {
    try {
      const userRef = doc(db, 'users', user.uid);
      const userName = name || user.displayName || user.email.split('@')[0];

      // Check if this user already exists (returning user vs new signup)
      const existingSnap = await getDoc(userRef);
      const isNewUser = !existingSnap.exists();

      let baseCurrency = 'USD'; // fallback default
      if (isNewUser) {
        // New account — inherit the admin's default currency from systemSettings
        try {
          const settingsSnap = await getDoc(doc(db, 'systemSettings', 'config'));
          if (settingsSnap.exists() && settingsSnap.data().defaultCurrency) {
            baseCurrency = settingsSnap.data().defaultCurrency;
          }
        } catch(e) { console.warn('Could not read admin default currency:', e); }
      } else {
        // Returning user — keep their existing baseCurrency if set
        baseCurrency = existingSnap.data().baseCurrency || 'USD';
      }

      await setDoc(userRef, {
        uid: user.uid,
        email: user.email,
        name: userName,
        provider: provider,
        lastLoginAt: serverTimestamp(),
        createdAt: serverTimestamp(),
        status: 'active',
        ...(isNewUser ? { baseCurrency } : {})
      }, { merge: true });

      if (isNewUser) {
        localStorage.setItem('spendwise_currency', baseCurrency);
      }

      console.log("✅ USER SAVED TO FIRESTORE:", user.email, isNewUser ? `(new, baseCurrency: ${baseCurrency})` : '(returning)');
      return true;
    } catch (error) {
      console.error("Firestore error:", error);
      return false;
    }
  }
  
  function saveToLocalStorage(user) {
    localStorage.setItem('spendwise_user', JSON.stringify({
      uid: user.uid,
      email: user.email,
      name: user.displayName || user.email.split('@')[0],
      loggedIn: true
    }));
  }
  
  // GOOGLE SIGN IN
  async function signInWithGoogle() {
    showLoading(true);
    try {
      const result = await signInWithPopup(auth, googleProvider);
      await saveUserToFirestore(result.user, 'google.com');
      saveToLocalStorage(result.user);
      showSuccess(`Welcome! Redirecting...`);
      setTimeout(() => window.location.href = 'main.html', 1500);
    } catch (error) {
      showError('Google sign in failed');
    } finally {
      showLoading(false);
    }
  }
  
  // EMAIL SIGN UP
  async function signUpWithEmail(email, password, name) {
    showLoading(true);
    try {
      const result = await createUserWithEmailAndPassword(auth, email, password);
      await updateProfile(result.user, { displayName: name });
      await saveUserToFirestore(result.user, 'password', name);
      saveToLocalStorage(result.user);
      showSuccess('Account created! Redirecting...');
      setTimeout(() => window.location.href = 'main.html', 1500);
    } catch (error) {
      if (error.code === 'auth/email-already-in-use') {
        showError('Email already registered');
      } else if (error.code === 'auth/weak-password') {
        showError('Password too weak (min 6 chars)');
      } else {
        showError('Sign up failed');
      }
    } finally {
      showLoading(false);
    }
  }
  
  // EMAIL SIGN IN
  async function signInWithEmail(email, password) {
    showLoading(true);
    try {
      const result = await signInWithEmailAndPassword(auth, email, password);
      await saveUserToFirestore(result.user, 'password');
      saveToLocalStorage(result.user);
      showSuccess('Signed in! Redirecting...');
      setTimeout(() => window.location.href = 'main.html', 1500);
    } catch (error) {
      showError('Invalid email or password');
    } finally {
      showLoading(false);
    }
  }
  
  googleBtn.addEventListener('click', signInWithGoogle);
  
  // sign in/sign up
  document.querySelectorAll('.toggle-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const formType = btn.getAttribute('data-form');
      document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('loginForm').classList.toggle('active', formType === 'login');
      document.getElementById('signupForm').classList.toggle('active', formType === 'signup');
      errorDiv.style.display = 'none';
      successDiv.style.display = 'none';
    });
  });
  
  // Login form data
  document.getElementById('loginForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value.trim();
    if (!email || !password) {
      showError('Enter email and password');
      return;
    }
    signInWithEmail(email, password);
  });
  
  // Signup form data
  document.getElementById('signupForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const name = document.getElementById('signupName').value.trim();
    const email = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPassword').value.trim();
    if (!name || !email || !password) {
      showError('Fill all fields');
      return;
    }
    if (password.length < 6) {
      showError('Password must be at least 6 characters');
      return;
    }
    signUpWithEmail(email, password, name);
  });
  
  console.log("✅ Firebase ready - Will save users to Firestore 'users' collection");

  // Forgot Password Func
  const forgotBtn  = document.getElementById('forgotPasswordBtn');
  const forgotPanel = document.getElementById('forgotPanel');
  const sendResetBtn = document.getElementById('sendResetBtn');
  const cancelResetBtn = document.getElementById('cancelResetBtn');
  const resetEmailInput = document.getElementById('resetEmail');

  forgotBtn.addEventListener('click', () => {
    forgotPanel.style.display = 'block';
    forgotBtn.style.display = 'none';
    const emailVal = document.getElementById('loginEmail').value.trim(); // pre fill with login email if its there
    if (emailVal) resetEmailInput.value = emailVal;
    resetEmailInput.focus();
  });

  cancelResetBtn.addEventListener('click', () => {
    forgotPanel.style.display = 'none';
    forgotBtn.style.display = 'inline-block';
    resetEmailInput.value = '';
    errorDiv.style.display = 'none';
    successDiv.style.display = 'none';
  });

  sendResetBtn.addEventListener('click', async () => {
    const email = resetEmailInput.value.trim();
    if (!email) { showError('Enter your email address.'); return; }

    sendResetBtn.disabled = true;
    sendResetBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';

    try {
      await sendPasswordResetEmail(auth, email);
      showSuccess(`Reset link sent to ${email}. Check your inbox (and spam folder).`);
      setTimeout(() => {
        forgotPanel.style.display = 'none';
        forgotBtn.style.display = 'inline-block';
        resetEmailInput.value = '';
      }, 3500);
    } catch (error) {
      if (error.code === 'auth/user-not-found') {
        showError('No account found with that email.');
      } else if (error.code === 'auth/invalid-email') {
        showError('Invalid email address.');
      } else {
        showError('Failed to send reset link. Try again.');
      }
    } finally {
      sendResetBtn.disabled = false;
      sendResetBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Send Reset Link';
    }
  });

  resetEmailInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') sendResetBtn.click();
  });
</script>
</body>
</html>
